    <body>
        <div class="card">
            <h1>🧪 tex2unicode</h1>
            <div class="sub">
                LaTeX 数学表达式 → Unicode 纯文本 (基于 KaTeX AST) · 自动适配暗色模式
            </div>

            <label for="latexInput" style="font-weight: 500">📐 LaTeX 表达式：</label>
            <textarea
                id="latexInput"
                rows="3"
                placeholder="例如: \frac{1}{2} + \sum_{i=1}^{n} i^2"
            ></textarea>

            <div class="examples">
                <span class="example-badge" data-example="\frac{1}{2}">分数 ½</span>
                <span class="example-badge" data-example="x^2 + y_1">上下标 x² + y₁</span>
                <span class="example-badge" data-example="\sqrt[3]{x}">立方根 ∛x</span>
                <span class="example-badge" data-example="\sum_{i=1}^{n} i^2">求和 Σ</span>
                <span class="example-badge" data-example="\alpha + \beta + \gamma"
                    >希腊字母 α+β+γ</span
                >
                <span class="example-badge" data-example="\int_{0}^{\infty} e^{-x} dx">积分 ∫</span>
            </div>

            <!-- 新增：LaTeX 渲染预览区域（实时渲染） -->
            <div style="margin-top: 1.5rem">
                <label style="font-weight: 500">✨ LaTeX 渲染预览：</label>
                <div id="preview" class="preview-area">等待输入...</div>
            </div>

            <div class="btn-group">
                <button id="convertBtn">✨ 转换为 Unicode</button>
                <button id="copyBtn" style="background: #475569">📋 复制结果</button>
            </div>

            <div style="margin-top: 1.5rem">
                <label style="font-weight: 500">📄 转换结果：</label>
                <div id="output" class="output-area">等待转换...</div>
            </div>
        </div>

        <footer>
            ⚡ 基于 KaTeX 解析器 | 支持 \frac, \sqrt, 上下标, 求和/积分等<br />
            内部使用 <code>katex.__parse</code> 获取 AST 并递归转换为纯文本
        </footer>

        <script type="module">
            import katex from "katex";
            import "katex/dist/katex.min.css";
            import { tex2unicode } from "./src/index.ts";

            const inputEl = document.getElementById("latexInput");
            const outputEl = document.getElementById("output");
            const convertBtn = document.getElementById("convertBtn");
            const copyBtn = document.getElementById("copyBtn");
            const previewEl = document.getElementById("preview");

            // 实时渲染预览（使用 KaTeX）
            function renderPreview() {
                const latex = inputEl.value.trim();
                if (!latex) {
                    previewEl.innerHTML =
                        '<span class="preview-error">⚠️ 请输入 LaTeX 表达式</span>';
                    return;
                }
                try {
                    // 使用 KaTeX 渲染为 HTML（行内模式，displayMode: false）
                    const rendered = katex.render(latex, previewEl, {
                        throwOnError: true,
                        displayMode: false,
                        output: "html",
                    });
                    // previewEl.innerHTML = rendered;
                } catch (err) {
                    previewEl.innerHTML = `<span class="preview-error">❌ 渲染失败: ${err.message}</span>`;
                }
            }

            // 转换 Unicode 并更新输出区域
            function performConversion() {
                const latex = inputEl.value.trim();
                if (!latex) {
                    outputEl.textContent = "⚠️ 请输入 LaTeX 表达式";
                    return;
                }
                try {
                    const result = tex2unicode(latex);
                    outputEl.textContent = result || "(空结果)";
                } catch (err) {
                    console.error(err);
                    outputEl.textContent = `❌ 解析错误: ${err.message}`;
                }
            }

            // 示例点击填充
            document.querySelectorAll(".example-badge").forEach(badge => {
                badge.addEventListener("click", () => {
                    const example = badge.getAttribute("data-example");
                    inputEl.value = example;
                    renderPreview(); // 实时更新预览
                    performConversion(); // 同时更新 Unicode 结果
                });
            });

            // 监听输入框变化，实时更新预览（不自动更新 Unicode 结果，保留按钮触发）
            inputEl.addEventListener("input", () => {
                renderPreview();
                // 可选：如果你希望输入时自动转换 Unicode，可以取消注释下一行
                performConversion();
            });

            // 转换按钮：只更新 Unicode 结果
            convertBtn.addEventListener("click", performConversion);

            // 复制结果
            copyBtn.addEventListener("click", async () => {
                const text = outputEl.textContent;
                if (!text || text.startsWith("⚠️") || text.startsWith("❌")) {
                    alert("没有可复制的内容");
                    return;
                }
                try {
                    await navigator.clipboard.writeText(text);
                    const originalText = copyBtn.textContent;
                    copyBtn.textContent = "✅ 已复制！";
                    copyBtn.classList.add("copy-success");
                    setTimeout(() => {
                        copyBtn.textContent = originalText;
                        copyBtn.classList.remove("copy-success");
                    }, 1500);
                } catch (err) {
                    alert("复制失败，可手动选择复制");
                }
            });

            // 初始演示
            inputEl.value = "\\frac{1}{2} + \\sum_{i=1}^{n} i^2";
            renderPreview(); // 初次渲染预览
            performConversion(); // 初次转换 Unicode
        </script>
